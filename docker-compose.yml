version: "3.9"

services:
  # ── MCP API ────────────────────────────────────────────────────────────────
  mcp-api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: mcp-system:latest
    container_name: mcp-api
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8000}:8000"
      - "${METRICS_PORT:-9091}:9091"
    env_file:
      - .env
    environment:
      MCP_ENV: ${MCP_ENV:-development}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mcp-net

  # ── Redis (short-term memory + cache) ─────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: mcp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mcp-net

  # ── Qdrant (long-term vector memory) ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: mcp-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mcp-net

  # ── Prometheus (metrics) ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: mcp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - mcp-api
    networks:
      - mcp-net

  # ── Grafana (dashboards) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: mcp-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - mcp-net

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local
  qdrant-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  mcp-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
