name: Bug Report
description: File a bug report to help us improve
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: version
    attributes:
      label: MCP System Version
      description: What version are you running?
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Docker Compose (local)
        - Kubernetes
        - Local Python (no Docker)
        - Cloud (specify in description)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create context with `POST /api/v1/contexts/`
        2. Append message with `PUT /api/v1/contexts/{id}/messages`
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste relevant structured log output (JSON lines preferred).
      render: json

  - type: textarea
    id: config
    attributes:
      label: Configuration (sanitized)
      description: Relevant config values (remove all secrets).
      render: yaml
