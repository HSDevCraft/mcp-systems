apiVersion: v1
kind: Service
metadata:
  name: mcp-api
  namespace: mcp-system
  labels:
    app: mcp-api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9091
      targetPort: 9091
      protocol: TCP
  selector:
    app: mcp-api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-api
  namespace: mcp-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.mcp-system.io
      secretName: mcp-tls
  rules:
    - host: api.mcp-system.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-api
                port:
                  number: 80
