name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check src tests

      - name: Check formatting (black)
        run: black --check src tests

      - name: Run mypy
        run: mypy src

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit \
            -m "unit and not slow" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        env:
          MCP_ENV: test
          MCP_SECRET_KEY: test-secret-key-for-ci-32chars!!
          JWT_SECRET_KEY: test-jwt-secret-for-ci-32chars!!!
          LOG_LEVEL: WARNING
          ENABLE_METRICS: "false"
          RATE_LIMIT_ENABLED: "false"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: coverage.xml
          flags: unit

  # ── Integration Tests ──────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest tests/integration \
            -m "integration" \
            -v \
            --timeout=60
        env:
          MCP_ENV: test
          MCP_SECRET_KEY: test-secret-key-for-ci-32chars!!
          JWT_SECRET_KEY: test-jwt-secret-for-ci-32chars!!!
          REDIS_URL: redis://localhost:6379/15
          LOG_LEVEL: WARNING
          ENABLE_METRICS: "false"
          RATE_LIMIT_ENABLED: "false"

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: mcp-system:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image health
        run: |
          docker run -d --name mcp-test \
            -e MCP_ENV=test \
            -e MCP_SECRET_KEY=test-secret-32chars-minimum!!!! \
            -e JWT_SECRET_KEY=test-jwt-32chars-minimum!!!!!!! \
            -p 8000:8000 \
            mcp-system:ci
          sleep 10
          curl -f http://localhost:8000/health/live || exit 1
          docker stop mcp-test
